<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>可爱小鸟飞游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            position: fixed;
            background: #87CEEB;
        }
        #gameCanvas {
            width: 100%; height: 100%;
            image-rendering: pixelated;
            touch-action: none;
            display: block;
        }
        #startBtn {
            position: absolute;
            padding: 15px 30px; font-size: 20px;
            background: #4CAF50; color: white;
            border: none; border-radius: 10px;
            cursor: pointer;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        #startBtn:active {
            background: #45a049;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<button id="startBtn">开始游戏</button>

<script>
(function() {
    "use strict";

    var canvas, ctx, startBtn;
    var gameStarted = false;
    var gameWidth, gameHeight;
    var scaleFactor = 1;

    var bird = {
        x: 80,
        y: 200,
        size: 40,
        gravity: 0.2,
        lift: -4,
        velocity: 0,
        wingOpen: false,
        speed: 2
    };

    var pipes = [];
    var pipeWidth = 70;
    var pipeGap = 150;
    var pipeSpeed = 2;
    var lastPipeTime = 0;
    var pipeInterval = 2500;

    var foods = [];
    var score = 0;

    // 图片对象
    var imgBg = new Image();
    var imgBirdClose = new Image();
    var imgBirdOpen = new Image();
    var imgPipeTop = new Image();
    var imgPipeBottom = new Image();
    var imgCorn = new Image();
    var imgCarrot = new Image();
    var imgLajiao = new Image();

    // 音频对象
    var soundBg, soundEat, soundWing;

    function initGameDimensions() {
        gameWidth = window.innerWidth;
        gameHeight = window.innerHeight;
        scaleFactor = gameHeight / 667;

        bird.size = Math.round(40 * scaleFactor);
        bird.x = Math.round(gameWidth * 0.2);
        pipeWidth = Math.round(70 * scaleFactor);
        pipeGap = Math.max(bird.size * 3.5, Math.round(150 * scaleFactor));
        pipeSpeed = Math.round(2 * scaleFactor);
        pipeInterval = Math.round(2500 / scaleFactor);
    }

    function init() {
        canvas = document.getElementById("gameCanvas");
        ctx = canvas.getContext("2d");
        startBtn = document.getElementById("startBtn");

        initGameDimensions();

        // ✅ 100% 对齐仓库文件名的路径
        imgBg.src = "bg.png.png";
        imgBirdClose.src = "bird_close.png.png";
        imgBirdOpen.src = "小鸟open.png";
        imgPipeTop.src = "pipe_top.png.png";
        imgPipeBottom.src = "zhuzi.png";
        imgCorn.src = "fruit.png.png";
        imgCarrot.src = "luobo.png";
        imgLajiao.src = "lajiao.png";

        // 监听图片加载结果（控制台会打印，方便排查）
        imgBg.onload = () => console.log("✅ bg.png.png 加载成功");
        imgBg.onerror = () => console.error("❌ bg.png.png 加载失败（404/路径错误）");
        imgBirdClose.onload = () => console.log("✅ bird_close.png.png 加载成功");
        imgBirdClose.onerror = () => console.error("❌ bird_close.png.png 加载失败");
        imgBirdOpen.onload = () => console.log("✅ 小鸟open.png 加载成功");
        imgBirdOpen.onerror = () => console.error("❌ 小鸟open.png 加载失败");
        imgPipeTop.onload = () => console.log("✅ pipe_top.png.png 加载成功");
        imgPipeTop.onerror = () => console.error("❌ pipe_top.png.png 加载失败");
        imgPipeBottom.onload = () => console.log("✅ zhuzi.png 加载成功");
        imgPipeBottom.onerror = () => console.error("❌ zhuzi.png 加载失败");
        imgCorn.onload = () => console.log("✅ fruit.png.png 加载成功");
        imgCorn.onerror = () => console.error("❌ fruit.png.png 加载失败");
        imgCarrot.onload = () => console.log("✅ luobo.png 加载成功");
        imgCarrot.onerror = () => console.error("❌ luobo.png 加载失败");
        imgLajiao.onload = () => console.log("✅ lajiao.png 加载成功");
        imgLajiao.onerror = () => console.error("❌ lajiao.png 加载失败");

        // 音频初始化（同样对齐文件名）
        soundBg = new Audio("Velvet Afternoon 背景音.mp3");
        soundBg.loop = true;
        soundBg.volume = 0.5;
        soundBg.onerror = () => console.error("❌ Velvet Afternoon 背景音.mp3 加载失败");

        soundEat = new Audio("吃水果.mp3");
        soundEat.volume = 0.7;
        soundEat.onerror = () => console.error("❌ 吃水果.mp3 加载失败");

        soundWing = new Audio("扇翅膀.mp3");
        soundWing.volume = 0.6;
        soundWing.onerror = () => console.error("❌ 扇翅膀.mp3 加载失败");

        // 绑定事件
        startBtn.addEventListener("click", startGame);
        startBtn.addEventListener("touchend", function(e) {
            e.preventDefault();
            startGame();
        });

        canvas.addEventListener("click", jump);
        canvas.addEventListener("touchstart", function(e) {
            e.preventDefault();
            jump();
        });

        window.addEventListener("resize", resizeCanvas);

        resizeCanvas();
        gameLoop();
    }

    function resizeCanvas() {
        initGameDimensions();
        if (canvas) {
            canvas.width = gameWidth;
            canvas.height = gameHeight;
            bird.y = gameHeight / 2;
        }
    }

    function drawBackground() {
        // 强制绘制图片，不做加载判断
        ctx.drawImage(imgBg, 0, 0, gameWidth, gameHeight);
    }

    function drawBird() {
        var birdImg = bird.wingOpen ? imgBirdOpen : imgBirdClose;
        ctx.drawImage(birdImg, bird.x - bird.size/2, bird.y - bird.size/2, bird.size, bird.size);
    }

    function drawPipe(p) {
        var pImg = p.type === "top" ? imgPipeTop : imgPipeBottom;
        ctx.drawImage(pImg, p.x, p.y, pipeWidth, p.h);
    }

    function drawFood(f) {
        var fImg = null;
        if (f.type === "corn") fImg = imgCorn;
        else if (f.type === "carrot") fImg = imgCarrot;
        else if (f.type === "lajiao") fImg = imgLajiao;
        ctx.drawImage(fImg, f.x - f.size/2, f.y - f.size/2, f.size, f.size);
    }

    function jump(e) {
        if (e) e.preventDefault();
        if (!gameStarted) return;
        bird.velocity = bird.lift;
        bird.wingOpen = !bird.wingOpen;

        try {
            soundWing.currentTime = 0;
            soundWing.play();
        } catch(err) {}
    }

    function startGame() {
        if (gameStarted) return;

        gameStarted = true;
        startBtn.style.display = "none";
        bird.y = gameHeight / 2;
        bird.velocity = 0;
        bird.wingOpen = false;
        pipes = [];
        foods = [];
        score = 0;
        lastPipeTime = Date.now();

        // 触发音频上下文，解决浏览器限制
        soundWing.play().then(() => {
            soundWing.pause();
            soundWing.currentTime = 0;
            soundBg.play();
        }).catch(err => console.error("❌ 音频初始化失败:", err));
    }

    function createPipe() {
        var topHeight = gameHeight * 0.2 + Math.random() * gameHeight * 0.25;

        if (topHeight < gameHeight * 0.15) topHeight = gameHeight * 0.15;
        if (topHeight > gameHeight * 0.45) topHeight = gameHeight * 0.45;

        var bottomY = topHeight + pipeGap;
        var bottomHeight = gameHeight - bottomY;

        pipes.push({
            x: gameWidth,
            y: 0,
            h: topHeight,
            type: "top",
            scored: false
        });

        pipes.push({
            x: gameWidth,
            y: bottomY,
            h: bottomHeight,
            type: "bottom",
            scored: false
        });

        createFood(topHeight, bottomY);
    }

    function createFood(topPipeHeight, bottomPipeY) {
        var foodY = topPipeHeight + pipeGap * 0.5;
        
        var foodTypes = ["corn", "carrot", "lajiao"];
        var foodType = foodTypes[Math.floor(Math.random() * foodTypes.length)];

        foods.push({
            x: gameWidth + 50,
            y: foodY,
            size: 28,
            type: foodType
        });
    }

    function checkCollision() {
        var birdLeft = bird.x - bird.size/2 + 5;
        var birdRight = bird.x + bird.size/2 - 5;
        var birdTop = bird.y - bird.size/2 + 5;
        var birdBottom = bird.y + bird.size/2 - 5;

        if (birdTop < 0 || birdBottom > gameHeight) {
            return true;
        }

        for (var i = 0; i < pipes.length; i++) {
            var p = pipes[i];
            var pLeft = p.x;
            var pRight = p.x + pipeWidth;

            if (birdRight > pLeft && birdLeft < pRight) {
                if (birdTop < p.y + p.h && birdBottom > p.y) {
                    return true;
                }
            }
        }

        return false;
    }

    function gameLoop() {
        ctx.clearRect(0, 0, gameWidth, gameHeight);
        drawBackground();

        if (gameStarted) {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (bird.y < bird.size/2) {
                bird.y = bird.size/2;
                bird.velocity = 0;
            }
            if (bird.y > gameHeight - bird.size/2) {
                bird.y = gameHeight - bird.size/2;
                bird.velocity = 0;
            }

            var now = Date.now();
            if (now - lastPipeTime > pipeInterval) {
                createPipe();
                lastPipeTime = now;
            }

            for (var i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;
                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            for (var j = foods.length - 1; j >= 0; j--) {
                foods[j].x -= pipeSpeed;
                if (foods[j].x + 30 < 0) {
                    foods.splice(j, 1);
                }
            }

            if (checkCollision()) {
                gameOver();
            }

            for (var k = 0; k < foods.length; k++) {
                var f = foods[k];
                var dist = Math.sqrt((bird.x - f.x) * (bird.x - f.x) + (bird.y - f.y) * (bird.y - f.y));
                if (dist < bird.size/2 + f.size/2) {
                    try {
                        soundEat.currentTime = 0;
                        soundEat.play();
                    } catch(err) {}
                    score += 3;
                    foods.splice(k, 1);
                    k--;
                }
            }

            for (var m = 0; m < pipes.length; m++) {
                var p = pipes[m];
                if (p.type === "top" && !p.scored && p.x + pipeWidth < bird.x - bird.size/2) {
                    p.scored = true;
                    score++;
                }
            }
        }

        for (var n = 0; n < pipes.length; n++) {
            drawPipe(pipes[n]);
        }

        for (var o = 0; o < foods.length; o++) {
            drawFood(foods[o]);
        }

        drawBird();

        ctx.fillStyle = "#fff";
        ctx.font = "bold 24px Arial";
        ctx.fillText("得分：" + score, 15, 35);

        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        gameStarted = false;

        try {
            soundBg.pause();
        } catch(err) {}

        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, gameWidth, gameHeight);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 36px Arial";
        ctx.textAlign = "center";
        ctx.fillText("游戏结束", gameWidth/2, gameHeight/2 - 30);
        ctx.fillText("最终得分：" + score, gameWidth/2, gameHeight/2 + 10);
        ctx.textAlign = "left";

        setTimeout(function() {
            startBtn.style.display = "block";
            startBtn.textContent = "再来一次";
        }, 2000);
    }

    window.addEventListener("load", init);
    window.addEventListener("resize", function() {
        setTimeout(resizeCanvas, 100);
    });
})();
</script>

</body>
</html>
