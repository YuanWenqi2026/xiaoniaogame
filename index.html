<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小鸟飞游戏</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#87CEEB}
        canvas{display:block;width:100%;height:100%}
        #startBtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:14px 28px;background:#4CAF50;color:white;border:none;border-radius:10px;font-size:18px;z-index:10}
    </style>
</head>
<body>

<canvas id="c"></canvas>
<button id="start">开始游戏</button>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const startBtn=document.getElementById('start');

let w=window.innerWidth;
let h=window.innerHeight;
canvas.width=w; canvas.height=h;

let gameStarted=false;

// 小鸟
let bird={x:w*0.2,y:h/2,size:40,gravity:0.2,lift:-4,vy:0,wing:false};

// 管道
let pipes=[];
let pipeW=70;
let pipeGap=160;
let pipeSpeed=2;

// 食物
let foods=[];
let score=0;

// ==========================
// 图片（后台异步加载，不卡）
// ==========================
const imgs={};
function loadImg(src){const img=new Image();img.src=src;return img;}
imgs.bg=loadImg("bg1.png.png");
imgs.birdClose=loadImg("bird_close.png.png");
imgs.birdOpen=loadImg("小鸟open.png");
imgs.pipeTop=loadImg("pipe_top1.png.png");
imgs.pipeBottom=loadImg("zhuzi1.png");
imgs.corn=loadImg("fruit.png.png");
imgs.carrot=loadImg("luobo.png");
imgs.lajiao=loadImg("lajiao.png");

// ==========================
// 音频（点击后才加载，超级快）
// ==========================
let sounds={};
function initAudio(){
    if(sounds.bg) return;
    sounds.bg=new Audio("Velvet Afternoon 背景音1.mp3");
    sounds.eat=new Audio("吃水果.mp3");
    sounds.wing=new Audio("扇翅膀.mp3");
    sounds.bg.loop=true;
    sounds.bg.volume=0.5;
}

// 开始游戏
function startGame(){
    gameStarted=true;
    startBtn.style.display="none";
    initAudio();
    try{ sounds.bg.play(); }catch(e){}
    bird.y=h/2; bird.vy=0;
    pipes=[]; foods=[]; score=0;
}

// 跳跃
function jump(){
    if(!gameStarted) return;
    bird.vy=bird.lift;
    bird.wing=!bird.wing;
    try{ sounds.wing.currentTime=0; sounds.wing.play(); }catch(e){}
}

// 创建管道
function createPipe(){
    let topH=h*0.2+Math.random()*h*0.25;
    topH=Math.max(h*0.15,Math.min(h*0.45,topH));
    let bottomY=topH+pipeGap;
    pipes.push(
        {x:w,y:0,h:topH,type:"top",scored:false},
        {x:w,y:bottomY,h:h-bottomY,type:"bottom"}
    );
    let y=topH+pipeGap/2;
    let t=["corn","carrot","lajiao"];
    foods.push({x:w+50,y:y,size:28,type:t[Math.floor(Math.random()*3)]});
}

// 游戏循环
function loop(){
    ctx.clearRect(0,0,w,h);
    ctx.drawImage(imgs.bg,0,0,w,h);

    if(gameStarted){
        bird.vy+=bird.gravity;
        bird.y+=bird.vy;

        if(Math.random()<0.008) createPipe();

        pipes.forEach(p=>{p.x-=pipeSpeed;});
        foods.forEach(f=>{f.x-=pipeSpeed;});

        // 碰撞
        if(bird.y<0||bird.y>h) gameOver();
        pipes.forEach(p=>{
            if(
                bird.x+20>p.x && bird.x-20<p.x+pipeW &&
                bird.y+20>p.y && bird.y-20<p.y+p.h
            ) gameOver();
        });

        // 吃食物
        foods.forEach((f,i)=>{
            let d=Math.hypot(bird.x-f.x,bird.y-f.y);
            if(d<35){
                try{ sounds.eat.currentTime=0; sounds.eat.play(); }catch(e){}
                score+=3; foods.splice(i,1);
            }
        });
    }

    // 绘制管道
    pipes.forEach(p=>{
        let img=p.type=="top"?imgs.pipeTop:imgs.pipeBottom;
        ctx.drawImage(img,p.x,p.y,pipeW,p.h);
    });

    // 绘制食物
    foods.forEach(f=>{
        let img=imgs[f.type];
        ctx.drawImage(img,f.x-f.size/2,f.y-f.size/2,f.size,f.size);
    });

    // 绘制小鸟
    let birdImg=bird.wing?imgs.birdOpen:imgs.birdClose;
    ctx.drawImage(birdImg,bird.x-bird.size/2,bird.y-bird.size/2,bird.size,bird.size);

    // 分数
    ctx.fillStyle="#fff";
    ctx.font="bold 24px Arial";
    ctx.fillText("得分："+score,15,35);

    requestAnimationFrame(loop);
}

function gameOver(){
    gameStarted=false;
    try{ sounds.bg.pause(); }catch(e){}
    setTimeout(()=>{startBtn.style.display="block";startBtn.textContent="再来一次";},2000);
}

startBtn.onclick=startGame;
canvas.onclick=jump;
window.onresize=()=>{w=window.innerWidth;h=window.innerHeight;canvas.width=w;canvas.height=h;};
loop();
</script>

</body>
</html>
