<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="portrait">
    <meta name="orientation" content="portrait">
    <title>可爱小鸟飞游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            position: fixed;
            background: #222;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            touch-action: none;
        }
        #startBtn {
            position: absolute;
            padding: 15px 30px; font-size: 20px;
            background: #4CAF50; color: white;
            border: none; border-radius: 10px;
            cursor: pointer; z-index: 10;
            touch-action: manipulation;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        #startBtn:disabled {
            background: #999;
        }
        #rotateHint {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #222;
            color: white;
            font-size: 20px;
            text-align: center;
            padding-top: 40vh;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div id="rotateHint">请将手机旋转至竖屏模式</div>
<canvas id="gameCanvas"></canvas>
<button id="startBtn">开始游戏</button>

<script>
(function() {
    "use strict";

    var canvas, ctx, startBtn, rotateHint;
    var gameStarted = false;
    var gamePaused = true;
    var gameWidth, gameHeight;
    var scaleFactor = 1;

    var bird = {
        x: 90,
        y: 200,
        size: 40,
        gravity: 0.25,
        lift: -4.5,
        velocity: 0,
        wing: "close",
        speed: 2
    };

    var pipes = [];
    var pipeWidth = 60;
    var pipeGap = 120;
    var pipeSpeed = 2;

    var foods = [];
    var score = 0;

    var imgBg = new Image();
    var imgBirdClose = new Image();
    var imgBirdOpen = new Image();
    var imgPipeTop = new Image();
    var imgPipeBottom = new Image();
    var imgCorn = new Image();
    var imgCarrot = new Image();
    var imgLajiao = new Image();

    var soundBg, soundEat, soundWing;

    function initGameDimensions() {
        gameWidth = window.innerWidth;
        gameHeight = window.innerHeight;

        var baseWidth = 375;
        var baseHeight = 667;
        scaleFactor = Math.min(gameWidth / baseWidth, gameHeight / baseHeight);

        bird.size = Math.round(40 * scaleFactor);
        pipeWidth = Math.round(60 * scaleFactor);
        pipeGap = Math.round(120 * scaleFactor);
        pipeSpeed = Math.round(2 * scaleFactor);
        bird.speed = Math.round(2 * scaleFactor);
    }

    function init() {
        canvas = document.getElementById("gameCanvas");
        ctx = canvas.getContext("2d");
        startBtn = document.getElementById("startBtn");
        rotateHint = document.getElementById("rotateHint");

        initGameDimensions();

        imgBg.src = "bg.png.png";
        imgBirdClose.src = "bird_close.png.png";
        imgBirdOpen.src = "小鸟open.png";
        imgPipeTop.src = "pipe_top.png.png";
        imgPipeBottom.src = "zhuzi.png";
        imgCorn.src = "fruit.png.png";
        imgCarrot.src = "luobo.png";
        imgLajiao.src = "lajiao.png";

        soundBg = new Audio("Velvet Afternoon 背景音.mp3");
        soundBg.loop = true;
        soundBg.volume = 0.5;

        soundEat = new Audio("吃水果.mp3");
        soundEat.volume = 0.7;

        soundWing = new Audio("扇翅膀.mp3");
        soundWing.volume = 0.6;

        resizeCanvas();

        startBtn.addEventListener("click", startGame);
        startBtn.addEventListener("touchend", function(e) {
            e.preventDefault();
            startGame();
        });

        canvas.addEventListener("click", jump);
        canvas.addEventListener("touchstart", function(e) {
            e.preventDefault();
            jump();
        }, { passive: false });

        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("orientationchange", function() {
            setTimeout(resizeCanvas, 100);
        });

        gameLoop();
    }

    function resizeCanvas() {
        initGameDimensions();

        if (!canvas) return;
        canvas.width = gameWidth;
        canvas.height = gameHeight;
        bird.y = gameHeight / 2;

        checkOrientation();
    }

    function checkOrientation() {
        if (gameHeight > gameWidth) {
            if (rotateHint) rotateHint.style.display = "none";
            document.body.style.display = "flex";
        } else {
            if (rotateHint) rotateHint.style.display = "block";
            document.body.style.display = "none";
        }
    }

    function jump(e) {
        if (e) e.preventDefault();
        if (gamePaused) return;
        bird.velocity = bird.lift;
        bird.wing = bird.wing === "close" ? "open" : "close";

        try {
            soundWing.currentTime = 0;
            soundWing.play();
        } catch (err) {}
    }

    function startGame() {
        if (gameStarted) return;

        gameStarted = true;
        gamePaused = false;
        startBtn.style.display = "none";

        try {
            soundBg.play();
        } catch (err) {}

        resetGame();
    }

    function resetGame() {
        bird.x = gameWidth * 0.2;
        bird.y = gameHeight / 2;
        bird.velocity = 0;
        bird.wing = "close";
        pipes = [];
        foods = [];
        score = 0;
    }

    function createPipe() {
        var minPipeHeight = gameHeight * 0.1;
        var maxTopHeight = gameHeight - pipeGap - minPipeHeight;
        var topH = Math.random() * (maxTopHeight - minPipeHeight) + minPipeHeight;

        pipes.push(
            { x: gameWidth, y: 0, h: topH, type: "top", scored: false },
            { x: gameWidth, y: topH + pipeGap, h: gameHeight - topH - pipeGap, type: "bottom" }
        );
        createFood(topH);
    }

    function createFood(topH) {
        var centerY = topH + pipeGap / 2;
        var ty = centerY + (Math.random() - 0.5) * (pipeGap - 40);
        ty = Math.max(topH + 20, Math.min(topH + pipeGap - 20, ty));

        var list = ["corn", "carrot", "lajiao"];
        var type = list[Math.floor(Math.random() * 3)];
        var foodSize = Math.round(28 * scaleFactor);
        foods.push({ x: gameWidth + 30, y: ty, size: foodSize, type: type });
    }

    function gameOver() {
        gamePaused = true;
        gameStarted = false;

        try {
            soundBg.pause();
        } catch (err) {}

        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, gameWidth, gameHeight);
        ctx.fillStyle = "#fff";
        ctx.font = "bold " + Math.round(32 * scaleFactor) + "px Arial";
        ctx.textAlign = "center";
        ctx.fillText("游戏结束", gameWidth / 2, gameHeight / 2 - 30);
        ctx.fillText("最终得分：" + score, gameWidth / 2, gameHeight / 2 + 10);

        setTimeout(function() {
            startBtn.style.display = "block";
            startBtn.textContent = "再来一次";
        }, 2000);
    }

    function drawBackground() {
        if (imgBg && imgBg.complete && imgBg.width > 0) {
            ctx.drawImage(imgBg, 0, 0, gameWidth, gameHeight);
        } else {
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, gameWidth, gameHeight);
        }
    }

    function drawBird() {
        var birdImg = bird.wing === "close" ? imgBirdClose : imgBirdOpen;
        if (birdImg && birdImg.complete && birdImg.width > 0) {
            ctx.drawImage(birdImg, bird.x - bird.size / 2, bird.y - bird.size / 2, bird.size, bird.size);
        } else {
            ctx.fillStyle = "#FFD700";
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.size / 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawPipe(p) {
        var pImg = p.type === "top" ? imgPipeTop : imgPipeBottom;
        if (pImg && pImg.complete && pImg.width > 0) {
            ctx.drawImage(pImg, p.x, p.y, pipeWidth, p.h);
        } else {
            ctx.fillStyle = "#228B22";
            ctx.fillRect(p.x, p.y, pipeWidth, p.h);
        }
    }

    function drawFood(f) {
        var fImg = null;
        if (f.type === "corn") fImg = imgCorn;
        else if (f.type === "carrot") fImg = imgCarrot;
        else if (f.type === "lajiao") fImg = imgLajiao;

        if (fImg && fImg.complete && fImg.width > 0) {
            ctx.drawImage(fImg, f.x - f.size / 2, f.y - f.size / 2, f.size, f.size);
        } else {
            ctx.fillStyle = "#FF6347";
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.size / 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, gameWidth, gameHeight);

        drawBackground();

        if (!gamePaused) {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (bird.y < bird.size / 2) {
                bird.y = bird.size / 2;
                bird.velocity = 0;
            }
            if (bird.y > gameHeight - bird.size / 2) {
                bird.y = gameHeight - bird.size / 2;
                bird.velocity = 0;
            }
        }

        drawBird();

        if (!gamePaused && Math.random() < 0.02) {
            createPipe();
        }

        for (var i = pipes.length - 1; i >= 0; i--) {
            var p = pipes[i];
            if (!gamePaused) p.x -= pipeSpeed;

            drawPipe(p);

            if (!gamePaused) {
                var hitboxPadding = bird.size * 0.3;
                if (bird.x + hitboxPadding > p.x &&
                    bird.x - hitboxPadding < p.x + pipeWidth &&
                    bird.y + hitboxPadding > p.y &&
                    bird.y - hitboxPadding < p.y + p.h) {
                    gameOver();
                }

                if (p.x + pipeWidth < bird.x && !p.scored && p.type === "top") {
                    p.scored = true;
                    score += 1;
                }
            }

            if (p.x + pipeWidth < -10) pipes.splice(i, 1);
        }

        for (var j = foods.length - 1; j >= 0; j--) {
            var f = foods[j];
            if (!gamePaused) f.x -= pipeSpeed;

            drawFood(f);

            if (!gamePaused) {
                var d = Math.hypot(bird.x - f.x, bird.y - f.y);
                if (d < bird.size * 0.7) {
                    try {
                        soundEat.currentTime = 0;
                        soundEat.play();
                    } catch (err) {}
                    score += 3;
                    foods.splice(j, 1);
                }
            }

            if (f.x < -30) foods.splice(j, 1);
        }

        if (!gamePaused && (bird.y <= bird.size / 2 || bird.y >= gameHeight - bird.size / 2)) {
            if (bird.velocity !== 0) {
                gameOver();
            }
        }

        ctx.fillStyle = "#fff";
        ctx.font = "bold " + Math.round(20 * scaleFactor) + "px Arial";
        ctx.fillText("得分：" + score, 15, 30);

        requestAnimationFrame(gameLoop);
    }

    window.addEventListener("load", init);
    window.addEventListener("resize", function() {
        setTimeout(resizeCanvas, 100);
    });
})();
</script>

</body>
</html>
