<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>可爱小鸟飞游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #222; width: 100vw; height: 100vh;
        }
        canvas {
            display: none; width: 100%; height: 100%;
            image-rendering: pixelated;
        }
        #startBtn {
            padding: 12px 24px; font-size: 18px;
            background: #4CAF50; color: white;
            border: none; border-radius: 10px;
            cursor: pointer; z-index: 999;
        }
    </style>
</head>
<body>

<button id="startBtn">开始游戏</button>
<canvas id="gameCanvas"></canvas>

<script>
let canvas, ctx, startBtn;
let gameStarted = false;

// 小鸟属性
let bird = {
    x: 90,
    y: 200,
    size: 50,
    gravity: 0.12,
    lift: -2.5,
    velocity: 0,
    wing: "close",
    speed: 1.5
};

// 管道 —— 隧道宽度 = 小鸟 × 3
let pipes = [];
let pipeWidth = 70;
let pipeGap = bird.size * 3;
let pipeSpeed = 1.2;

// 蔬菜水果
let foods = [];
let score = 0;

// ==========================
// 🔊 音效（相对路径）
// ==========================
const sounds = {
    bg: new Audio("Velvet Afternoon 背景音.mp3"),
    eat: new Audio("吃水果.mp3"),
    wing: new Audio("扇翅膀.mp3")
};
sounds.bg.loop = true;
sounds.bg.volume = 0.5;
sounds.wing.volume = 0.6;
sounds.eat.volume = 0.7;

// ==========================
// 🖼️ 图片（相对路径）
// ==========================
const images = {
    bg:        "bg.png.png",
    birdClose: "bird_close.png.png",
    birdOpen:  "小鸟open.png",
    pipeTop:   "pipe_top.png.png",
    pipeBottom:"zhuzi.png",
    corn:      "fruit.png.png",
    carrot:    "luobo.png",
    lajiao:    "lajiao.png"
};

let img = {};
let allLoaded = true; // ✅ 修复：直接允许开始游戏，不卡死

// 直接加载资源，不卡加载
function loadAllImages() {
    for (let key in images) {
        img[key] = new Image();
        img[key].src = images[key];
    }
}

// 初始化
window.onload = function () {
    canvas = document.getElementById("gameCanvas");
    ctx = canvas.getContext("2d");
    startBtn = document.getElementById("startBtn");

    resizeCanvas();
    loadAllImages();

    startBtn.onclick = startGame;
    canvas.onclick = jump;
    window.addEventListener('resize', resizeCanvas);
};

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    bird.y = canvas.height / 2;
    pipeGap = bird.size * 3;
}

function startGame() {
    // ✅ 修复：永远不会卡在“资源加载中”
    gameStarted = true;
    startBtn.style.display = "none";
    canvas.style.display = "block";
    
    try { sounds.bg.play(); } catch (e) {}
    
    resetGame();
    gameLoop();
}

function resetGame() {
    bird.x = 90;
    bird.y = canvas.height / 2;
    bird.velocity = 0;
    bird.wing = "close";
    pipes = [];
    foods = [];
    score = 0;
}

// 点击飞
function jump() {
    if (!gameStarted) return;
    bird.velocity = bird.lift;
    bird.wing = bird.wing === "close" ? "open" : "close";
    
    try {
        sounds.wing.currentTime = 0;
        sounds.wing.play();
    } catch(e){}
}

// 创建管道（隧道宽度绝对 ≥ 小鸟3倍）
function createPipe() {
    let minPipeHeight = 60;
    let maxTopHeight = canvas.height - pipeGap - minPipeHeight;
    let topH = Math.random() * (maxTopHeight - minPipeHeight) + minPipeHeight;
    
    pipes.push(
        { x: canvas.width, y: 0, h: topH, type: "top", scored: false },
        { x: canvas.width, y: topH + pipeGap, h: canvas.height - topH - pipeGap, type: "bottom" }
    );
    createFood(topH);
}

// 创建食物（不会在障碍物上）
function createFood(topH) {
    let centerY = topH + pipeGap / 2;
    let ty = centerY + (Math.random() - 0.5) * (pipeGap - 60);
    ty = Math.max(topH + 25, Math.min(topH + pipeGap - 25, ty));

    let list = ["corn", "carrot", "lajiao"];
    let type = list[Math.floor(Math.random() * 3)];
    foods.push({ x: canvas.width + 30, y: ty, size: 32, type });
}

// 游戏循环
function gameLoop() {
    if (!gameStarted) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景
    ctx.drawImage(img.bg, 0, 0, canvas.width, canvas.height);

    // 小鸟向前飞
    bird.x += bird.speed;

    // 小鸟下落
    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    // 绘制小鸟
    let birdImg = bird.wing === "close" ? img.birdClose : img.birdOpen;
    ctx.drawImage(birdImg, bird.x - bird.size/2, bird.y - bird.size/2, bird.size, bird.size);

    // 管道生成
    if (Math.random() < 0.008) createPipe();

    // 管道移动
    for (let i = pipes.length - 1; i >= 0; i--) {
        let p = pipes[i];
        p.x -= pipeSpeed;

        let pImg = p.type === "top" ? img.pipeTop : img.pipeBottom;
        ctx.drawImage(pImg, p.x, p.y, pipeWidth, p.h);

        // 碰撞
        if (
            bird.x + 20 > p.x &&
            bird.x - 20 < p.x + pipeWidth &&
            bird.y + 20 > p.y &&
            bird.y - 20 < p.y + p.h
        ) gameOver();

        // 计分
        if (p.x + pipeWidth < bird.x && !p.scored && p.type === "top") {
            p.scored = true;
            score += 1;
        }

        if (p.x + pipeWidth < -50) pipes.splice(i, 1);
    }

    // 食物
    for (let i = foods.length - 1; i >= 0; i--) {
        let f = foods[i];
        f.x -= pipeSpeed;
        ctx.drawImage(img[f.type], f.x - f.size/2, f.y - f.size/2, f.size, f.size);

        let d = Math.hypot(bird.x - f.x, bird.y - f.y);
        if (d < 35) {
            try { sounds.eat.currentTime = 0; sounds.eat.play(); } catch (e) {}
            score += 3;
            foods.splice(i, 1);
        }
        if (f.x < -50) foods.splice(i, 1);
    }

    // 边界死亡
    if (bird.y < 0 || bird.y > canvas.height) gameOver();

    // 分数
    ctx.fillStyle = "#fff";
    ctx.font = "22px bold Arial";
    ctx.fillText("得分：" + score, 20, 40);

    requestAnimationFrame(gameLoop);
}

// 游戏结束
function gameOver() {
    gameStarted = false;
    sounds.bg.pause();

    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#fff";
    ctx.font = "36px Arial";
    ctx.textAlign = "center";
    ctx.fillText("游戏结束", canvas.width/2, canvas.height/2 - 30);
    ctx.fillText("最终得分：" + score, canvas.width/2, canvas.height/2 + 10);
    
    setTimeout(() => {
        startBtn.style.display = "block";
        canvas.style.display = "none";
        resetGame();
    }, 2000);
}
</script>

</body>
</html>
